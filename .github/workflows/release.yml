name: Release-Please

# This workflow runs on every push to main and updates the release PR
on:
  push:
    branches:
      - main
  # You can also manually trigger this workflow from GitHub Actions tab
  workflow_dispatch:

# Required permissions for release-please to create releases and PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  # Run release-please on every push to automatically update the release PR
  release-please:
    uses: ./.github/workflows/release-please-embedded.yml
    secrets: inherit
    with:
      releaseType: "simple"

  # Auto-merge the release PR if commit message starts with "release:"
  auto-merge-release:
    runs-on: ubuntu-latest
    needs: release-please
    if: startsWith(github.event.head_commit.message, 'release:')
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Find and merge release PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🔍 Looking for release PR..."

          # Find the release PR created by release-please
          PR_NUMBER=$(gh pr list --label "autorelease: pending" --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            echo "⚠️  No release PR found with label 'autorelease: pending'"
            exit 0
          fi

          echo "✅ Found release PR #$PR_NUMBER"
          echo "🔄 Auto-merging release PR..."

          # Merge the PR
          gh pr merge "$PR_NUMBER" --squash --delete-branch

          echo "✅ Release PR merged successfully!"
