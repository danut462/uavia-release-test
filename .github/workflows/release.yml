name: Release-Please

# This workflow triggers when you push a commit with "release:" in the message
on:
  push:
    branches:
      - main
  # You can also manually trigger this workflow from GitHub Actions tab
  workflow_dispatch:

# Required permissions for release-please to create releases and PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  # Only run if commit message starts with "release:"
  check-release-commit:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" =~ ^release: ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "✅ Release commit detected: $COMMIT_MSG"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "⏭️  Not a release commit, skipping"
          fi

  # Run release-please using the local reusable workflow
  release-please:
    needs: check-release-commit
    if: needs.check-release-commit.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/release-please-embedded.yml
    secrets: inherit
    with:
      releaseType: "simple"
