name: Auto-Release (Reusable)

# Reusable workflow for automated releases with configurable specific jobs
on:
  workflow_call:
    inputs:
      specific_jobs:
        description: 'Comma-separated list of specific update workflow paths (e.g., "Automatic-release-specific/update-version.yml,Another-workflow.yml")'
        required: false
        type: string
        default: ""
    secrets:
      PAT_TOKEN:
        required: true

jobs:
  # Run release-please on every push to automatically update the release PR
  release-please:
    uses: ./.github/workflows/release-please-embedded.yml
    secrets: inherit
    with:
      releaseType: "simple"

  # === NO-PR CASCADE HANDLING ===
  # Handle case where no conventional commits exist, but cascade is requested

  # Check if release-please created a PR
  check-no-pr-cascade:
    needs: [release-please]
    if: startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    outputs:
      no_pr: ${{ steps.check.outputs.no_pr }}
    steps:
      - name: Check if release PR exists
        id: check
        run: |
          # Check if there's an open release PR with autorelease label
          PR_COUNT=$(gh pr list \
            --repo ${{ github.repository }} \
            --label "autorelease: pending" \
            --state open \
            --json number \
            --jq 'length')

          if [ "$PR_COUNT" -eq 0 ]; then
            echo "no_pr=true" >> $GITHUB_OUTPUT
            echo "📭 No release PR found - no conventional commits to release"
          else
            echo "no_pr=false" >> $GITHUB_OUTPUT
            echo "📬 Release PR exists (#$PR_COUNT)"
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

  # Detect cascade from original commit (only if no PR)
  detect-no-pr-cascade:
    needs: [check-no-pr-cascade]
    if: needs.check-no-pr-cascade.outputs.no_pr == 'true'
    uses: ./.github/workflows/detect-cascade.yml
    with:
      commit_sha: ${{ github.sha }}

  # Launch cascade directly (skip build since no release)
  launch-no-pr-cascade:
    needs: [detect-no-pr-cascade]
    uses: ./.github/workflows/launch-cascade.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      trigger_cascade: ${{ needs.detect-no-pr-cascade.outputs.cascade == 'true' }}

  # === RELEASE ORCHESTRATION (only when commit starts with "release:") ===

  # Step 1: Get PR info (number and version) - only if PR exists
  get-release-pr-info:
    needs: [release-please, check-no-pr-cascade]
    if: |
      startsWith(github.event.head_commit.message, 'release:') &&
      needs.check-no-pr-cascade.outputs.no_pr == 'false'
    uses: ./.github/workflows/get-release-pr-info.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

  # Step 2: Get latest dependency versions - only if PR exists
  get-dependency-versions:
    needs: [release-please, check-no-pr-cascade, get-release-pr-info]
    if: |
      startsWith(github.event.head_commit.message, 'release:') &&
      needs.check-no-pr-cascade.outputs.no_pr == 'false'
    uses: ./.github/workflows/get-dependency-versions.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repositories: "UAVIA/uavia-ckt,UAVIA/srp,UAVIA/uavia-navtools,UAVIA/uavia-protocol"

  # Step 3: Modify files in the PR (add more modification workflows here as needed)

  # 3. Update conanfile.py dependencies
  update-conanfile:
    needs: [get-release-pr-info, get-dependency-versions]
    if: ${{ !cancelled() && needs.get-dependency-versions.result == 'success' }}
    uses: ./.github/workflows/update-conanfile.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ needs.get-release-pr-info.outputs.pr_number }}
      version: ${{ needs.get-release-pr-info.outputs.version }}
      dependencies: ${{ needs.get-dependency-versions.outputs.versions_json }}
  
  # 3b. Specific update file jobs (provided as input)
  # Pre-defined slots for up to 5 specific workflows

  # Helper job to parse specific_jobs input
  parse-specific-jobs:
    needs: [get-release-pr-info, get-dependency-versions, update-conanfile]
    if: |
      !cancelled() &&
      needs.get-release-pr-info.result == 'success' &&
      needs.get-dependency-versions.result == 'success' &&
      needs.update-conanfile.result == 'success' &&
      inputs.specific_jobs != ''
    runs-on: ubuntu-latest
    outputs:
      job_1: ${{ steps.parse.outputs.job_1 }}
      job_2: ${{ steps.parse.outputs.job_2 }}
      job_3: ${{ steps.parse.outputs.job_3 }}
      job_4: ${{ steps.parse.outputs.job_4 }}
      job_5: ${{ steps.parse.outputs.job_5 }}
    steps:
      - name: Parse specific jobs list
        id: parse
        run: |
          JOBS="${{ inputs.specific_jobs }}"
          echo "Input: $JOBS"

          # Split comma-separated list
          IFS=',' read -ra JOB_ARRAY <<< "$JOBS"

          # Output each job path
          for i in "${!JOB_ARRAY[@]}"; do
            job=$(echo "${JOB_ARRAY[$i]}" | xargs)  # Trim whitespace
            slot=$((i + 1))
            echo "job_${slot}=$job" >> $GITHUB_OUTPUT
            echo "Slot $slot: $job"
          done

  specific-job-1:
    needs: [get-release-pr-info, parse-specific-jobs]
    if: needs.parse-specific-jobs.outputs.job_1 != ''
    uses: ./.github/workflows/${{ needs.parse-specific-jobs.outputs.job_1 }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ needs.get-release-pr-info.outputs.pr_number }}
      version: ${{ needs.get-release-pr-info.outputs.version }}

  specific-job-2:
    needs: [get-release-pr-info, parse-specific-jobs, specific-job-1]
    if: |
      !cancelled() &&
      needs.parse-specific-jobs.outputs.job_2 != '' &&
      (needs.specific-job-1.result == 'success' || needs.specific-job-1.result == 'skipped')
    uses: ./.github/workflows/${{ needs.parse-specific-jobs.outputs.job_2 }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ needs.get-release-pr-info.outputs.pr_number }}
      version: ${{ needs.get-release-pr-info.outputs.version }}

  specific-job-3:
    needs: [get-release-pr-info, parse-specific-jobs, specific-job-2]
    if: |
      !cancelled() &&
      needs.parse-specific-jobs.outputs.job_3 != '' &&
      (needs.specific-job-2.result == 'success' || needs.specific-job-2.result == 'skipped')
    uses: ./.github/workflows/${{ needs.parse-specific-jobs.outputs.job_3 }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ needs.get-release-pr-info.outputs.pr_number }}
      version: ${{ needs.get-release-pr-info.outputs.version }}

  specific-job-4:
    needs: [get-release-pr-info, parse-specific-jobs, specific-job-3]
    if: |
      !cancelled() &&
      needs.parse-specific-jobs.outputs.job_4 != '' &&
      (needs.specific-job-3.result == 'success' || needs.specific-job-3.result == 'skipped')
    uses: ./.github/workflows/${{ needs.parse-specific-jobs.outputs.job_4 }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ needs.get-release-pr-info.outputs.pr_number }}
      version: ${{ needs.get-release-pr-info.outputs.version }}

  specific-job-5:
    needs: [get-release-pr-info, parse-specific-jobs, specific-job-4]
    if: |
      !cancelled() &&
      needs.parse-specific-jobs.outputs.job_5 != '' &&
      (needs.specific-job-4.result == 'success' || needs.specific-job-4.result == 'skipped')
    uses: ./.github/workflows/${{ needs.parse-specific-jobs.outputs.job_5 }}
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ needs.get-release-pr-info.outputs.pr_number }}
      version: ${{ needs.get-release-pr-info.outputs.version }}

  # ADD MORE SPECIFIC JOB SLOTS HERE IF NEEDED (up to 5 currently)
  
  # 3c. Add cascade marker to PR branch if cascade flag detected
  add-cascade-marker:
    needs: [get-release-pr-info, update-conanfile]
    if: contains(github.event.head_commit.message, '[cascade]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Add cascade marker commit to PR branch
        run: |
          PR_NUMBER="${{ needs.get-release-pr-info.outputs.pr_number }}"

          # Get PR branch name
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')

          echo "📍 Adding cascade marker to PR branch: $PR_BRANCH"

          # Fetch and checkout PR branch
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add empty commit with cascade marker
          git commit --allow-empty -m "[cascade]"

          # Push to PR branch
          git push origin "$PR_BRANCH"

          echo "✅ Cascade marker added to PR"
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

  # Step 4: Merge the PR (after all modifications are done)
  auto-merge-pr:
    needs: [
      get-release-pr-info,
      update-conanfile,
      add-cascade-marker,
      parse-specific-jobs,
      specific-job-1,
      specific-job-2,
      specific-job-3,
      specific-job-4,
      specific-job-5
    ]
    if: |
      always() &&
      needs.get-release-pr-info.result == 'success' &&
      (needs.update-conanfile.result == 'success' || needs.update-conanfile.result == 'skipped') &&
      (needs.add-cascade-marker.result == 'success' || needs.add-cascade-marker.result == 'skipped') &&
      (needs.parse-specific-jobs.result == 'success' || needs.parse-specific-jobs.result == 'skipped') &&
      (needs.specific-job-1.result == 'success' || needs.specific-job-1.result == 'skipped') &&
      (needs.specific-job-2.result == 'success' || needs.specific-job-2.result == 'skipped') &&
      (needs.specific-job-3.result == 'success' || needs.specific-job-3.result == 'skipped') &&
      (needs.specific-job-4.result == 'success' || needs.specific-job-4.result == 'skipped') &&
      (needs.specific-job-5.result == 'success' || needs.specific-job-5.result == 'skipped')
    uses: ./.github/workflows/auto-merge-pr.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      pr_number: ${{ needs.get-release-pr-info.outputs.pr_number }}

  # Step 5: Prepare "main" versions for dependencies
  prepare-main-versions:
    needs: [get-dependency-versions, auto-merge-pr]
    if: needs.auto-merge-pr.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      main_versions: ${{ steps.transform.outputs.main_versions }}
    steps:
      - name: Transform versions to "main"
        id: transform
        run: |
          # Take the versions JSON and replace all values with "main"
          VERSIONS='${{ needs.get-dependency-versions.outputs.versions_json }}'

          # Use jq -c to output compact (single-line) JSON for GITHUB_OUTPUT
          MAIN_VERSIONS=$(echo "$VERSIONS" | jq -c 'with_entries(.value = "main")')

          echo "main_versions=$MAIN_VERSIONS" >> $GITHUB_OUTPUT
          echo "📦 Dependencies set to main: $MAIN_VERSIONS"

  # Step 6: Reset dependencies back to "main" on main branch (after release is merged)
  reset-conanfile-to-main:
    needs: [prepare-main-versions]
    uses: ./.github/workflows/update-conanfile.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      branch: "main"
      version: "main"
      dependencies: ${{ needs.prepare-main-versions.outputs.main_versions }}
