name: Detect Cascade Flag

# Reusable workflow to detect [cascade] marker in commit message
on:
  workflow_call:
    inputs:
      commit_sha:
        description: 'Commit SHA to check for cascade flag'
        required: true
        type: string
    outputs:
      cascade:
        description: 'Whether cascade flag is present (true/false)'
        value: ${{ jobs.detect.outputs.cascade }}

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      cascade: ${{ steps.check.outputs.cascade }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 0

      - name: Check for cascade marker
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --format=%B "${{ inputs.commit_sha }}")

          echo "📝 Commit message:"
          echo "$COMMIT_MSG"
          echo ""

          if echo "$COMMIT_MSG" | grep -q '\[cascade\]'; then
            echo "🔗 Cascade flag detected!"
            echo "cascade=true" >> $GITHUB_OUTPUT
          else
            echo "⏹️  No cascade flag found"
            echo "cascade=false" >> $GITHUB_OUTPUT
          fi
