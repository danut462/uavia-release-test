name: Build Stable

on:
  push:
    branches:
      - main

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                build:
                - {
                    host: "self-hosted",
                    labels: ["self-hosted", "Linux", "X64", "ubuntu22"],
                    runner: "native",
                    arch: "x86_64",
                    shared: "False",
                    compiler: { name: "GCC", versions: "11" },
                    profiles: { host: "default", target: "none" },
                  }
                - {
                  host: "self-hosted",
                  labels: ["self-hosted", "Linux", "X64", "ubuntu22"],
                  runner: "native",
                  arch: "armv8",
                  shared: "False",
                  compiler: { name: "GCC", versions: "6" },
                  profiles: { host: "default", target: "parrot-airsdk-anafi2-classic-7.7.0", },
                }
                - {
                  host: "self-hosted",
                  labels: ["self-hosted", "Linux", "X64", "ubuntu22"],
                  runner: "native",
                  arch: "armv8",
                  shared: "False",
                  compiler: { name: "GCC", versions: "6" },
                  profiles: { host: "default", target: "parrot-airsdk-anafi3-classic-8.3.0", },
                }
                - {
                    host: "self-hosted",
                    labels: ["self-hosted", "Linux", "X64", "ubuntu22"],
                    runner: "native",
                    arch: "x86_64",
                    shared: "False",
                    compiler: { name: "GCC", versions: "9" },
                    profiles: { host: "default", target: "yocto-gcc-9-glibc-x86_64-uavia-sdk-3.1.33", },
                  }
                - {
                    host: "self-hosted",
                    labels: ["self-hosted", "Linux", "X64", "ubuntu22"],
                    runner: "native",
                    arch: "armv8",
                    shared: "False",
                    compiler: { name: "GCC", versions: "8" },
                    profiles: { host: "default", target: "yocto-gcc-8-glibc-tegra186-uavia-sdk-3.1.33-l4t-32.6.1", },
                  }
        uses: ./.github/workflows/common_steps.yml
        secrets: inherit
        with:
            build-matrix: ${{ toJson(matrix.build) }}
            conan_channel: 'stable'
            testmode: false # Do not launch tests.
