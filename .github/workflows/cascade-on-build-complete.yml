name: Cascade on Build Complete

# Triggers when the "Build on Tag" workflow completes
on:
  workflow_run:
    workflows: ["Build on Tag"]  # Must match build-on-tag.yml name exactly
    types: [completed]

permissions:
  contents: read

jobs:
  # Detect if cascade flag is present
  detect-cascade:
    # Only cascade if build succeeded
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/detect-cascade.yml
    with:
      commit_sha: ${{ github.event.workflow_run.head_sha }}

  # Launch cascade to next repository
  launch-cascade:
    needs: detect-cascade
    uses: ./.github/workflows/launch-cascade.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      trigger_cascade: ${{ fromJSON(needs.detect-cascade.outputs.cascade) }}
