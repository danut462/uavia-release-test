name: Release

# Main release workflow - triggered by push to main
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Call auto-release workflow with specific update jobs
  auto-release:
    uses: ./.github/workflows/auto-release.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      # Comma-separated list of specific workflows to run
      specific_jobs: "update-version.yml"
      # Pass commit message for cascade and release detection
      commit_message: ${{ github.event.head_commit.message }}
