name: Auto-Merge Release

# Generic reusable workflow to merge a release-please PR
# All modifications should be done BEFORE calling this workflow
on:
  workflow_call:
    inputs:
      pr_number:
        type: string
        description: 'PR number to merge (optional - will auto-detect if not provided)'
        required: false
        default: ''
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Find or use provided PR number
        id: get-pr
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            echo "📌 Using provided PR number: #$PR_NUMBER"
          else
            echo "🔍 Auto-detecting release PR..."
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --label "autorelease: pending" --json number --jq '.[0].number')

            if [ -z "$PR_NUMBER" ]; then
              echo "⚠️  No release PR found with label 'autorelease: pending'"
              exit 0
            fi

            echo "✅ Found release PR #$PR_NUMBER"
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Merge release PR
        if: steps.get-pr.outputs.pr_number
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "🔄 Auto-merging release PR #${{ steps.get-pr.outputs.pr_number }}..."

          # Wait for any recent updates to be processed
          sleep 5

          # Merge the PR
          gh pr merge "${{ steps.get-pr.outputs.pr_number }}" \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch

          echo "✅ Release PR merged successfully!"
