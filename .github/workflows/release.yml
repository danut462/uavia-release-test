name: Automatic-Release

# This workflow runs on every push to main and triggers the auto-release process
on:
  push:
    branches:
      - main
  # You can also manually trigger this workflow from GitHub Actions tab
  workflow_dispatch:

# Required permissions for release-please to create releases and PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  # Detect if cascade flag is present in commit message
  detect-cascade:
    uses: ./.github/workflows/detect-cascade.yml
    with:
      commit_sha: ${{ github.sha }}

  # Call the auto-release workflow to handle the release process
  auto-release:
    needs: detect-cascade
    if: |
      always() && 
      needs.detect-cascade.result == 'success'
    uses: ./.github/workflows/auto-release.yml
    secrets: inherit
    with:
      cascade: ${{ fromJSON(needs.detect-cascade.outputs.cascade) }}
      release: ${{ github.event.head_commit != null && startsWith(github.event.head_commit.message, 'release:') }}
      repositories-dependancies: "UAVIA/uavia-ckt,UAVIA/srp,UAVIA/uavia-navtools,UAVIA/uavia-protocol"