name: Release-Please
on:
  repository_dispatch:
    types: [trigger-release-please]
  workflow_call:
    inputs:
        releaseType:
            type: string
            description: 'Type of Release Please'
            required: false
            default: simple
  push:
    branches:
      - main

jobs:
    release-please:
        uses: UAVIA/reusable-workflows/.github/workflows/release-please-embedded.yml@main
        secrets: inherit
        with:
          releaseType: "simple"

    dispatch:
      needs: release-please
      strategy:
        matrix:
          repo: ['UAVIA/uavia-net', 'UAVIA/uavia-dkt', 'UAVIA/uavia-protocol']
      runs-on: ubuntu-latest
      steps:
        - name: Generate token
          id: generate_token
          uses: tibdex/github-app-token@b62528385c34dbc9f38e5f4225ac829252d1ea92
          with:
            app_id: ${{ secrets.GH_ACTION_APP_ID }}
            private_key: ${{ secrets.GH_ACTION_APP_KEY }}
        - name: Repository Dispatch
          uses: peter-evans/repository-dispatch@v2
          with:
            token: ${{ steps.generate_token.outputs.token  }}
            repository: ${{ matrix.repo }}
            event-type: trigger-release-please
