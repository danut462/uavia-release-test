name: Release-Please
on:
  workflow_call:
    inputs:
      releaseType:
        type: string
        description: 'Type of Release Please'
        required: false
        default: 'simple'

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v3
        with:
          release-type: ${{ inputs.releaseType }}
          package-name: ${{ github.event.repository.name }}
          token: ${{ secrets.PAT_TOKEN }}
          default-branch: main
          bump-minor-pre-major: true
          include-v-in-tag: false
          annotated-tags: true
          test-test: true
          pull-request-header: "⭐ I have created a release ⭐"
          changelog-types: |
            [
              {"type":"feat","section":"🚀 Features","hidden":false},
              {"type":"fix","section":"🐞 Bug Fixes","hidden":false},
              {"type":"refactor","section":"🛠 Refactors and code quality improvements","hidden":false}
            ]