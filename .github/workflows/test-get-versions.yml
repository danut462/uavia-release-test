name: Test Get Versions

# Test workflow to verify get-dependency-versions works correctly
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-get-versions:
    uses: ./.github/workflows/get-dependency-versions.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      repositories: "UAVIA/uavia-ckt,UAVIA/uavia-srp"

  display-results:
    needs: test-get-versions
    runs-on: ubuntu-latest
    steps:
      - name: Display versions
        run: |
          echo "📦 Fetched versions:"
          echo "${{ needs.test-get-versions.outputs.versions_json }}"
          echo ""
          echo "Parsed versions:"
          echo '${{ needs.test-get-versions.outputs.versions_json }}' | jq '.'
