name: Release-Please

# This workflow runs on every push to main and updates the release PR
on:
  push:
    branches:
      - main
  # You can also manually trigger this workflow from GitHub Actions tab
  workflow_dispatch:

# Required permissions for release-please to create releases and PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  # Run release-please on every push to automatically update the release PR
  release-please:
    uses: ./.github/workflows/release-please-embedded.yml
    secrets: inherit
    with:
      releaseType: "simple"

  # Auto-merge the release PR if commit message starts with "release:"
  auto-merge-release:
    needs: release-please
    if: startsWith(github.event.head_commit.message, 'release:')
    uses: ./.github/workflows/auto-merge-release.yml
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
    with:
      update_version_file: true
      update_conan_dependencies: true
      conan_dependencies: '{"ckt": "{{VERSION}}", "srp": "{{VERSION}}"}'
